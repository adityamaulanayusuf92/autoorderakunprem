version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dokz_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: dokz_store
      MYSQL_USER: dokz_user
      MYSQL_PASSWORD: dokz_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - dokz_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dokz_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_USER: dokz_user
      DB_PASSWORD: dokz_password
      DB_NAME: dokz_store
      JWT_SECRET: your-secret-key-change-this
      FRONTEND_URL: http://localhost:3000
      MAIL_SERVICE: gmail
      MAIL_USER: your-email@gmail.com
      MAIL_PASS: your-app-password
    depends_on:
      - mysql
    networks:
      - dokz_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dokz_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - dokz_network
    command: ["npm", "run", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:

networks:
  dokz_network:
    driver: bridge
